<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>티끌모아금연</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="app-header">🚭 티끌모아금연</header>

<div class="app">

<div class="grid">
    <div class="card"><p>누적</p><h2 id="total"></h2></div>
    <div class="card"><p>오늘</p><h2 id="today"></h2></div>
    <div class="card"><p>금액</p><h2 id="money"></h2></div>

    <div class="card"><p>연속</p><h2 id="streak"></h2></div>
    <div class="card"><p>목표</p><h2 id="goal"></h2></div>
    <div class="card empty"></div>
</div>

<div class="progress-bar">
    <div id="progress-fill"></div>
</div>
<div id="progress-text"></div>

<button id="mainBtn" class="cta-main">🚭 참기</button>
<button id="sendBtn" class="cta-sub">💸 송금</button>

<div class="bottom">
    <button id="statsBtn">통계</button>
    <button id="calendarBtn">달력</button>
    <button id="resetBtn">초기화</button>
</div>

</div>

<div id="statsModal" class="modal hidden">
    <div class="modal-content">
        <canvas id="chart"></canvas>
        <button onclick="closeModal()">닫기</button>
    </div>
</div>

<div id="calendarModal" class="modal hidden">
    <div class="modal-content">
        <div id="calendar"></div>
        <button onclick="closeModal()">닫기</button>
    </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
